<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cube Coders — Shop</title>

<style>

:root{
--accent:#00e1ff;
--card:#0a0a0a;
--text:#ffffff;
--muted:#9ca3af;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
}

body{
background:#000;
color:var(--text);
line-height:1.5;
}

.wrap{
max-width:1100px;
margin:auto;
padding:30px;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:55px;
height:55px;
border-radius:12px;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

nav{
display:flex;
align-items:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#00e1ff;
text-shadow:
0 0 5px #00e1ff,
0 0 15px #00e1ff;
}

/* HERO */

.hero{
background:#050505;
padding:50px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.05);
}

.hero h1{
font-size:40px;
margin-bottom:10px;
background:linear-gradient(90deg,#00e1ff,#0b84ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:var(--muted);
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:15px;
padding:12px 18px;
background:#0b84ff;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
box-shadow:0 0 20px #0b84ff;
}

/* GRID */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:40px;
}

/* CARD */

.card{
background:#0a0a0a;
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.06);
position:relative;
overflow:hidden;
cursor:pointer;

transition:transform .35s ease,
box-shadow .35s ease,
border .35s ease;
}

/* shine effect */

.card::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.35),
transparent
);

transform:skewX(-25deg);
}

/* hover */

.card:hover{
transform:translateY(-8px);

border:1px solid #00e1ff;

box-shadow:
0 10px 30px rgba(0,0,0,0.8),
0 0 20px rgba(0,225,255,0.8),
0 0 40px rgba(0,225,255,0.7),
0 0 70px rgba(0,225,255,0.6);
}

/* shine animation */

.card:hover::before{
animation:shineMove .8s ease;
}

@keyframes shineMove{
0%{left:-120%;}
100%{left:140%;}
}

.price{
font-weight:bold;
margin-top:10px;
}

/* CART BUTTON */

.cart-btn{
background:linear-gradient(135deg,#0b84ff,#00e1ff);
border:none;
color:white;
padding:10px 18px;
border-radius:12px;
font-weight:600;
cursor:pointer;
margin-left:15px;
}

/* CART DRAWER */

.cart-drawer{
position:fixed;
right:0;
top:0;
height:100%;
width:360px;
background:#050505;
transform:translateX(100%);
transition:transform .5s cubic-bezier(.17,.67,.34,1);
z-index:60;
padding:20px;
overflow:auto;
}

.cart-drawer.open{
transform:translateX(0);
}

.blur-bg{
filter:blur(6px);
}

</style>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
</head>

<body>

<div class="wrap" id="main-content">

<header>

<div class="brand">
<div class="logo"><img src="CubeCoders.jpg"></div>
<div>
<div style="font-weight:700">Cube Coders</div>
<div style="font-size:13px;color:#9ca3af">Minecraft Server Setups & Premium Plugins</div>
</div>
</div>

<nav>
<a href="index.html">Home</a>
<a href="#">Offers</a>

<button class="cart-btn" id="open-cart">
🛒 Cart (<span id="cart-count">0</span>)
</button>

</nav>
</header>

<section class="hero">
<h1>Shop — Server Plans & Offers</h1>
<p>Choose a plan and add to cart. Click Order Now to checkout.</p>
</section>

<section class="cards" id="product-list"></section>

</div>

<aside class="cart-drawer" id="cart-drawer">

<h2 style="color:#00e1ff">Your Cart</h2>

<div id="cart-items"></div>

<div id="cart-empty" style="margin-top:10px">
Your cart is empty.
</div>

<div style="margin-top:20px;display:flex;align-items:center;gap:15px;">

<button class="btn" id="checkout-btn">
Order Now
</button>

<span id="clear-cart" style="cursor:pointer;color:#9ca3af;font-size:14px;">
Clear Cart
</span>


</div>

<div style="margin-top:20px">
<button class="btn" id="close-cart">Close</button>
</div>

</aside>

<script>

const PRODUCTS = [
{id:'basic-1', title:'Normal Setup', price:100, desc:'Basic server setup', img:null},
{id:'itemeditor-1', title:'Item Editor Setup', price:200, desc:'Item editor config', img:null},
{id:'bundle-1', title:'All Paid Plugins Bundle', price:1000, desc:'Premium plugins bundle', img:'packmmc.jpg'},
{id:'megadeath', title:'MineDeath Lifesteal Setup', price:200, desc:'Optimized Lifesteal setup', img:null}
];

function loadCart(){
return JSON.parse(localStorage.getItem('cc_cart')||'[]')
}

function saveCart(cart){
localStorage.setItem('cc_cart',JSON.stringify(cart));
updateCartUI();
}

function addToCart(id){

let cart=loadCart();

const item=cart.find(i=>i.id===id);

if(item){
item.qty++;
}else{
const p=PRODUCTS.find(x=>x.id===id);
cart.push({id:p.id,title:p.title,price:p.price,qty:1});
}

saveCart(cart);

}

const productList=document.getElementById("product-list");

PRODUCTS.forEach(p=>{

const el=document.createElement("div");

el.className="card";
  el.setAttribute("data-aos","fade-up");

let img=p.img?`<img src="${p.img}" style="width:100%;border-radius:8px;height:140px;object-fit:cover">`:"";

el.innerHTML=`
${img}
<h3>${p.title}</h3>
<div style="color:#9ca3af">${p.desc}</div>
<div class="price">₹${p.price}</div>
<button class="btn" onclick="addToCart('${p.id}')">Add to Cart</button>
`;

productList.appendChild(el);

});

const openCart=document.getElementById("open-cart");
const closeCart=document.getElementById("close-cart");
const cartDrawer=document.getElementById("cart-drawer");

openCart.onclick=()=>{
cartDrawer.classList.add("open");
document.getElementById("main-content").classList.add("blur-bg");
}

closeCart.onclick=()=>{
cartDrawer.classList.remove("open");
document.getElementById("main-content").classList.remove("blur-bg");
}

function updateCartUI(){

const cart = loadCart();

const itemsContainer = document.getElementById("cart-items");
const emptyText = document.getElementById("cart-empty");

itemsContainer.innerHTML = "";

if(cart.length === 0){
emptyText.style.display = "block";
document.getElementById("cart-count").innerText = 0;
return;
}

emptyText.style.display = "none";

let totalCount = 0;

cart.forEach(item=>{

totalCount += item.qty;

const div = document.createElement("div");

div.style.marginBottom = "10px";

div.innerHTML = `
<div style="display:flex;justify-content:space-between;">
<span>${item.title}</span>
<span>₹${item.price} x ${item.qty}</span>
</div>
`;

itemsContainer.appendChild(div);

});

document.getElementById("cart-count").innerText = totalCount;

}
document.getElementById("clear-cart").onclick = function(){

localStorage.removeItem("cc_cart");

updateCartUI();

};
  const checkoutBtn = document.getElementById("checkout-btn");
  checkoutBtn.onclick = function(){

const cart = loadCart();

if(cart.length === 0){
alert("Cart is empty");
return;
}

/* cart checkout page ko bhej do */

localStorage.setItem("cc_checkout_cart", JSON.stringify(cart));

window.location.href = "checkout.html";

};
  </script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
duration:1000,
once:true
});
</script>

<script>
AOS.init({
duration:1000,
once:true
});

</script>

</body>
</html>
